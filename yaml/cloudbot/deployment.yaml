apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: cloudbot
  name: cloudbot-deployment
  namespace: cloudbot
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloudbot
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: cloudbot
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
              - key: env
                operator: In
                values:
                - dev-node 
      containers:
      - name: cloudbot
        image: gcr.io/gcp-gcs-pso/build-pod
        imagePullPolicy: Always
        volumeMounts:
          # name should match from volumes section
          - name: nfs-volume-1
            mountPath: "/data"
      volumes:
      - name: nfs-volume-1
        persistentVolumeClaim:
          claimName: nfs-pvc
