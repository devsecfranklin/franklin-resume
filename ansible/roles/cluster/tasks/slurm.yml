#  tags: cluster

- name: Change slurm file ownership, group and permissions
  ansible.builtin.file:
    path: "{{slurm_dir}}"
    owner: "{{slurm_user}}"
    group: "{{slurm_group}}"

- name: "slurm | Create {{slurm_log}} directory"
  ansible.builtin.file:
    path: "{{slurm_log}}"
    owner: "{{slurm_user}}"
    group: "{{slurm_group}}"
    mode: "0755"
    state: directory

- name: 'slurm | install cgroup.conf'
  ansible.builtin.copy:
    src: cgroup.conf
    dest: "{{slurm_dir}}/cgroup.conf"
    mode: 0644
  notify:
    - 'restart munge service'
    - 'restart slurmd service'
    - 'restart slurmctld service'
  tags: cluster

- name: "slurm-client | Ensure slurmd is started"
  service:
    name: slurmd
    state: started
    enabled: true
  tags: cluster

- name: "cluster | Ensure slurmctld is started"
  service:
    name: slurmctld
    state: started
    enabled: true
  when:
    - "'head' in inventory_hostname"
    - ansible_facts['distribution'] == "Debian"
  tags: cluster
