---
- name: "slurm | Install Slurm scheduler on Raspi Cluster worker node"
  ansible.builtin.apt:
    name:
      - slurmd
      - slurm-client
      - libpmix-dev
    state: latest
    force_apt_get: true
    update_cache: true
  when:
    - "'node' in inventory_hostname"
  tags: cluster

- name: "slurm | install server mpi/slurm dependencies"
  ansible.builtin.apt:
    name:
      - gfortran
      - libpmix-dev
      - slurm-wlm
      - slurmctld
    force_apt_get: true
    update_cache: true
  when:
    - "'head' in inventory_hostname"
  tags: cluster

- name: 'slurm | install slurm.conf'
  ansible.builtin.template:
    src: slurm.conf.j2
    dest: "/etc/slurm/slurm.conf"
    mode: "0644"
    owner: "{{slurm_user}}"
    group: "{{slurm_group}}"
  tags: cluster

# This is causing the daemon to fail
