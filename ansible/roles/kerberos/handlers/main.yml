---
- name: "Restart kdc"
  service:
    name: krb5-kdc
    state: restarted
    listen: "restart krb5-kdc service"

- name: "Restart krb5-admin-server"
  service:
    name: krb5-admin-server
    state: restarted
    listen: "restart krb5-admin-server service"

- name: restart sssd
  service: name=sssd state=restarted enabled=yes
  listen: "restart sssd"
