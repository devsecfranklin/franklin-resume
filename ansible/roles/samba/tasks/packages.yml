---
- name: 'Install SAMBA Packages on Debian/Ubuntu'
  ansible.builtin.apt:
    name:
      - acl
      - attr
      - samba 
      - samba-dsdb-modules
      - samba-vfs-modules
      - smbclient
      - winbind
      - libpam-winbind
      - libnss-winbind
      - libpam-krb5
      - krb5-config
      - krb5-user
      - dnsutils
      - chrony
      - net-tools
    force_apt_get: true
    update_cache: true
  tags:
    - cluster