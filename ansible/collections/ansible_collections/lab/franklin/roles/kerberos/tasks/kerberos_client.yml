---
- name: "kerberos | Create /var/log/kerberos folder"
  ansible.builtin.file:
    path: /var/log/kerberos
    owner: root
    state: directory
    mode: 0755
  tags:
    - krb5

# this is where the ca cert goes in SSL play
- name: "kerberos | Create /etc/krb5 folder"
  ansible.builtin.file:
    path: /etc/krb5
    owner: root
    state: directory
    mode: 0755

- name: "kerberos | Copy /etc/krb5.conf to Debian"
  ansible.builtin.copy:
    src: krb5.conf-debian
    dest: /etc/krb5.conf
    owner: root
    mode: 0664
  tags:
    - krb5
    - debian
  when:
    - ansible_facts['distribution'] == "Debian"
  #- ansible_facts.ansible_architecture is "aarch64"

# this is where the ca cert goes in SSL play
- name: "kerberos | Create /etc/heimdal folder on OpenBSD"
  ansible.builtin.file:
    path: /etc/heimdal
    owner: root
    state: directory
    mode: 0755
  tags:
    - krb5
    - openbsd
  when:
    - ansible_facts['distribution'] == "OpenBSD"

- name: "kerberos | Copy krb5.conf to OpenBSD"
  ansible.builtin.copy:
    src: krb5.conf-openbsd
    dest: /etc/heimdal/krb5.conf
    mode: 0644
    owner: root
  tags:
    - krb5
    - openbsd
  when:
    - ansible_facts['distribution'] == "OpenBSD"

- name: "kerberos | Create /etc/keytab folder"
  ansible.builtin.file:
    path: "/etc/keytab"
    state: directory
    mode: 0755
    owner: root
  tags:
    - krb5
  
- name: "kerberos | Copy /root/.k5login"
  ansible.builtin.copy:
    src: root/k5login
    dest: /root/.k5login
    mode: 0600
    owner: root
  tags:
    - krb5
  
- name: "kerberos | Copy /root/.k5users"
  ansible.builtin.copy:
    src: root/.k5users
    dest: /root/.k5login
    mode: 0600
    owner: root
  tags:
    - krb5