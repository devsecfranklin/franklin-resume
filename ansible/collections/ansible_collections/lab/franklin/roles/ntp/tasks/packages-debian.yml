- name: "Install NTP packages"
  ansible.builtin.apt:
    name:
      - tzdata
      - systemd-timesyncd
      - ntp
    force_apt_get: true
    update_cache: true
  tags:
    - ntp
    - timezone
  when:
  - ansible_facts['distribution'] == "Debian"

