# Source definition for receiving logs over TLS
source s_net_tls {
    network(
        transport("tls")
        port(6514)
        tls(
            # The server's certificate file
            cert-file("/etc/ssl/syslog-ng/syslog.cert")
            # The server's private key file
            key-file("/etc/ssl/syslog-ng/syslog.key")
            # Optional: CA certificate file for client authentication (if enabled)
            # ca-dir("/etc/ssl/syslog-ng/")
            # Optional: Setting peer-verify(required-untrusted) forces client auth
            peer-verify(optional)
        )
    );
};

# Log rule to catch messages from the new TLS source
log {
    source(s_net_tls);
    destination(d_file); # Replace with your actual destination, e.g., a central log file
};