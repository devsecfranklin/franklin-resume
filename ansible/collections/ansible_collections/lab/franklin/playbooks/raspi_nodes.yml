---
- name: 'Ansible Playbook for Raspi Cluster'
  hosts: raspi_nodes
  become: yes
  become_user: root
  gather_facts: yes
  vars:
    ansible_python_interpreter: "/usr/bin/python3"
  roles:
    - python
    - security
    - cluster
    - ntp
    - dns
    - common
    - raspberrypi
    - nfs
    - ldap
    - kerberos
    - ssh
    - golang
    - shell

  environment:
    DEBIAN_FRONTEND: noninteractive
