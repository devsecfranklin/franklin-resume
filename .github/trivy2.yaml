name: build container
on:
  pull_request:
jobs:
  build:
    name: build RHEL image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build an image from Dockerfile
        env:
          RHEL_USER: '${{ secrets.RHEL_USER }}'
          RHEL_PASS: '${{ secrets.RHEL_PASS }}'
        run: |
          ./bootstrap.sh
          ./configure
          cd docker && make rhel
