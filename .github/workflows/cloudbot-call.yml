name: "Cloudbot"
on:
  - pull_request
  - issue_comment
env:
  PR_NUMBER: ${{ github.event.pull_request.number }}
  COMMENT: ${{ github.event.comment.body }}
  ISSUE_NUMBER: ${{ github.event.issue.number }}
  HTML_URL: ${{ github.event.issue.html_url }}
jobs:
  phone-home:
    name: "Cloudbot Ingest PR"
    runs-on: ubuntu-latest
    steps:
      - id: "auth"
        uses: "google-github-actions/auth@v1"
        with:
          credentials_json: "${{ secrets.GOOGLE_CREDENTIALS }}"
      - name: "Set up Cloud SDK"
        uses: google-github-actions/setup-gcloud@v1
        with:
          install_components: "gke-gcloud-auth-plugin"
      - name: pull_request
        run: |
          curl --request POST --header "Content-Type:application/json" --header "Authorization: Bearer $(gcloud auth print-identity-token)" --data "{\"message\": \"Pull request number $PR_NUMBER by $GITHUB_ACTOR on repository $GITHUB_REPOSITORY\", \"pr_number\": \"$PR_NUMBER\", \"user\": \"$GITHUB_ACTOR\", \"repo\": \"$GITHUB_REPOSITORY\", \"ref\": \"$GITHUB_REF\", \"commit_sha\": \"$GITHUB_SHA\", \"comment\": \"$COMMENT\", \"issue_number\": \"$ISSUE_NUMBER\", \"html_url\": \"$HTML_URL\"}" https://us-central1-gcp-gcs-pso.cloudfunctions.net/cloudbot-franklin
