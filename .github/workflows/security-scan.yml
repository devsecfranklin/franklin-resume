name: Security & Integrity Scan

on:
  pull_request:
    branches: [ main ]

jobs:
  go-security-tests:
    name: Run Asset & Link Integrity Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true 

      - name: Initialize Go Modules
        run: go mod tidy && go test -coverprofile=coverage.out ./test/... && go tool cover -html=coverage.out -o coverage.html

      - name: Run Integrity Tests
        run: go test -json ./test/... > test-report.json && go test -v ./test/...